<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/dumbbell.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SplitApp — pick a science-based training split, browse exercises by muscle group, and track every workout." />
    <meta name="theme-color" content="#0c0c0e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />
    <script>
      // Apply the saved theme before paint to avoid a flash. Defaults to dark.
      (function () {
        try {
          var t = localStorage.getItem('ironpath:theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <title>SplitApp — Build Muscle With a Plan</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
